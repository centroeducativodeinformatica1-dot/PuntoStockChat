<!DOCTYPE html>
<html lang="es">
<head>

<div id="auth-screen"></div>

<div id="app" style="display:none;">

<script>
  function updateClock() {
    const el = document.getElementById('topbar-clock');
    if (el) el.textContent = new Date().toLocaleString('es-AR', {
      weekday:'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
    });
  }
  updateClock();
  setInterval(updateClock, 30000);

  function checkMobile() {
    const btn = document.getElementById('mobile-menu-btn');
    if (btn) btn.style.display = window.innerWidth <= 900 ? 'block' : 'none';
  }
  checkMobile();
  window.addEventListener('resize', checkMobile);

  // ── Mobile bottom nav ────────────────────────────────────
  function setMobileActive(btn, page) {
    // Quitar activo de todos
    document.querySelectorAll('.mobile-nav-item').forEach(b => b.classList.remove('active'));
    if (btn) {
      btn.classList.add('active');
    } else if (page) {
      // Para items del drawer, marcar el botón "Más"
      const masBtn = document.querySelector('.mobile-nav-item:last-child');
      if (masBtn) masBtn.classList.add('active');
    }
  }

  function openDrawer() {
    // Mostrar/ocultar admin en drawer según rol
    const adminItem = document.getElementById('drawer-admin-item');
    if (adminItem) adminItem.style.display = PS.isAdmin ? 'flex' : 'none';
    updateDrawerThemeLabel();

    // Selector multi-negocio en drawer
    const switcherEl = document.getElementById('drawer-biz-switcher');
    const negocios = PS.allBusinesses || [];
    if (switcherEl && negocios.length > 1) {
      switcherEl.style.display = 'block';
      switcherEl.innerHTML = `
        <div style="font-size:10px; font-weight:700; color:var(--text-muted);
                    text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px;">
          Cambiar negocio
        </div>
        <div style="display:flex; flex-direction:column; gap:4px;">
          ${negocios.map(biz => `
            <div onclick="PS.cambiarNegocio('${biz.id}'); closeDrawer();"
              style="display:flex; align-items:center; gap:10px; padding:10px 12px;
                     border-radius:var(--radius-md); cursor:pointer;
                     background:${biz.id === PS.businessId ? 'var(--green-muted)' : 'var(--bg-card)'};
                     border:1px solid ${biz.id === PS.businessId ? 'var(--border-green)' : 'var(--border)'};">
              <div style="width:8px; height:8px; border-radius:50%;
                           background:${biz.id === PS.businessId ? 'var(--green-primary)' : 'var(--text-muted)'}; flex-shrink:0;"></div>
              <span style="font-size:13px; font-weight:${biz.id === PS.businessId ? '700' : '500'};
                            color:${biz.id === PS.businessId ? 'var(--green-primary)' : 'var(--text-secondary)'};
                            flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                ${biz.name}
              </span>
              ${biz.id === PS.businessId ? `
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green-primary)" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>` : ''}
            </div>
          `).join('')}
        </div>
      `;
    } else if (switcherEl) {
      switcherEl.style.display = 'none';
    }

    document.getElementById('mobile-more-drawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    document.getElementById('mobile-more-drawer').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateDrawerThemeLabel() {
    const icon = document.getElementById('drawer-theme-icon');
    const label = document.getElementById('drawer-theme-label');
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    if (label) label.textContent = isDark ? 'Tema claro' : 'Tema oscuro';
    if (icon) {
      icon.innerHTML = isDark
        ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
  }

  // Cerrar drawer con swipe down
  let touchStartY = 0;
  document.getElementById('mobile-more-drawer').addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  });
  document.getElementById('mobile-more-drawer').addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 80) closeDrawer();
  });

  PS.init();

  // Aplicar logo correcto al cargar según tema guardado
  const savedTheme = localStorage.getItem('ps_theme') || 'dark';
  document.querySelectorAll('.ps-logo').forEach(img => {
    img.src = savedTheme === 'light' ? '../logo-light.png' : '../logo-dark.png';
  });
</script>
